name: Daily ALDI fetch

# The cron fires once a day at 12:00 UTC. The CLI runs in "expiry" mode by
# default: it only fetches a new publication when the latest one in the DB
# has expired (valid_date_end < today). When the current week is still
# valid, the run returns "not-due" and NO email is sent (no daily spam).
#
# Emails are only sent when:
#   - A new week was fetched (status=fetched)
#   - An error occurred (status=error)
#   - The fetch step failed (job.status != success)
#
# To force a fetch even when not expired (e.g. for testing), trigger the
# workflow manually with the "force" input set to true.
#
# EMAIL NOTIFICATIONS (optional):
#   Set two repository secrets to enable email:
#     1. RESEND_API_KEY  — get one free at https://resend.com (100 emails/day free)
#     2. NOTIFY_EMAIL    — the email address to send notifications to

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-fetch even if current week has not expired'
        type: boolean
        default: false
      mode:
        description: 'Fetch mode (expiry = only after current pub expires)'
        type: choice
        options: [expiry, daily, manual]
        default: expiry

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependency
        run: pip install -r requirements.txt

      - name: Resolve fetch options
        id: opts
        run: |
          # Default (scheduled) run: expiry mode, no force
          MODE="expiry"
          FORCE=""
          # Manual dispatch: use the inputs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
            if [ "${{ github.event.inputs.force }}" = "true" ]; then
              FORCE="--force"
            fi
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE" >> "$GITHUB_OUTPUT"
          echo "Resolved: mode=$MODE force=$FORCE"

      - name: Run auto-fetch
        id: fetch
        continue-on-error: true
        run: |
          set +e
          output=$(python aldi-cli.py --db aldi.db auto-fetch ${{ steps.opts.outputs.force }} --mode ${{ steps.opts.outputs.mode }} --log-file aldi.log 2>&1)
          exit_code=$?
          echo "$output"
          last_line=$(echo "$output" | tail -1 | tr -d '[:space:]')
          echo "result=$last_line" >> "$GITHUB_OUTPUT"
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit $exit_code

      - name: Commit updated DB + log
        id: commit
        if: steps.fetch.outputs.exit_code == '0'
        run: |
          git config user.name  "aldi-bot"
          git config user.email "aldi-bot@users.noreply.github.com"
          # aldi.db is tracked; aldi.log is gitignored (force-add to keep history)
          [ -f aldi.db ]  && git add aldi.db
          [ -f aldi.log ] && git add -f aldi.log
          if git diff --cached --quiet; then
            echo "No changes — week already in DB."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "auto: fetched new week $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger aldi-web rebuild on Vercel
        if: steps.commit.outputs.pushed == 'true' && env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          echo "🔄 Triggering aldi-web rebuild on Vercel (DB was updated)..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "   ✅ Vercel rebuild triggered"
          else
            echo "   ⚠️  Vercel hook returned HTTP $HTTP_CODE (non-fatal)"
          fi

      - name: Generate DB summary
        id: summary
        if: always()
        run: |
          python3 << 'PYEOF' > summary.txt
          import sqlite3, os, sys
          from datetime import datetime

          db_path = "aldi.db"
          if not os.path.exists(db_path):
              print("(no database found)")
              sys.exit(0)

          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row

          # Totals
          n_pubs = conn.execute("SELECT COUNT(*) FROM publications").fetchone()[0]
          n_products = conn.execute("SELECT COUNT(*) FROM products").fetchone()[0]
          n_offerings = conn.execute("SELECT COUNT(*) FROM product_offerings").fetchone()[0]

          print("📊 DATABASE SUMMARY")
          print("─" * 50)
          print(f"Publications tracked:   {n_pubs}")
          print(f"Unique products:        {n_products}")
          print(f"Total offerings:        {n_offerings}")
          print()

          if n_pubs == 0:
              print("(no publications in DB yet)")
              conn.close()
              sys.exit(0)

          # All publications with date ranges (oldest first)
          all_pubs = conn.execute("""
              SELECT id, slug, original_title, valid_dates, valid_date_start, valid_date_end, fetched_at,
                     (SELECT COUNT(*) FROM product_offerings WHERE publication_id=p.id) AS n_off
              FROM publications p
              ORDER BY p.valid_date_start ASC, p.fetched_at ASC
          """).fetchall()
          print("📆 ALL PUBLICATIONS")
          print("─" * 50)
          for p in all_pubs:
              label = p['valid_dates'] or p['original_title'] or p['slug']
              print(f"  {label:25s}  {p['n_off']:>4} offerings")
          print()

          # Latest publication
          latest = conn.execute("""
              SELECT p.id, p.slug, p.original_title, p.fetched_at, p.valid_for,
                     p.valid_dates, p.valid_date_start, p.valid_date_end,
                     p.num_pages,
                     (SELECT COUNT(*) FROM product_offerings WHERE publication_id=p.id) AS n_off
              FROM publications p
              ORDER BY p.valid_date_start DESC, p.fetched_at DESC
              LIMIT 1
          """).fetchone()

          print("📅 LATEST PUBLICATION")
          print("─" * 50)
          print(f"{latest['original_title'] or latest['slug']}")
          if latest['valid_dates']:
              print(f"  Valid:        {latest['valid_dates']}")
          else:
              print(f"  Valid:        (unknown)")
          print(f"  Fetched:      {latest['fetched_at'][:10]}")
          print(f"  Offerings:    {latest['n_off']}")
          print(f"  Pages:        {latest['num_pages'] or '-'}")

          # Price stats for latest pub
          ps = conn.execute("""
              SELECT COUNT(*) n, MIN(price_numeric) lo, MAX(price_numeric) hi, AVG(price_numeric) avg
              FROM product_offerings WHERE publication_id=? AND price_numeric IS NOT NULL
          """, (latest['id'],)).fetchone()
          if ps and ps['n']:
              print(f"  Price range:  {ps['lo']:.2f} € – {ps['hi']:.2f} €")
              print(f"  Avg price:    {ps['avg']:.2f} €")
          else:
              print("  Price range:  (no prices)")
          print()

          # Top categories in latest pub
          cats = conn.execute("""
              SELECT product_type, COUNT(*) c
              FROM product_offerings
              WHERE publication_id=? AND product_type IS NOT NULL AND product_type != ''
              GROUP BY product_type
              ORDER BY c DESC
              LIMIT 5
          """, (latest['id'],)).fetchall()
          if cats:
              print("🏷️  TOP CATEGORIES (latest week)")
              print("─" * 50)
              for c in cats:
                  print(f"  {c['c']:>3}  {c['product_type']}")
              print()

          # Changes vs previous publication (if 2+ pubs exist)
          if n_pubs >= 2:
              prev = conn.execute("""
                  SELECT id, original_title, slug, valid_dates
                  FROM publications
                  WHERE id != ?
                  ORDER BY valid_date_start DESC, fetched_at DESC
                  LIMIT 1
              """, (latest['id'],)).fetchone()

              if prev:
                  # Get product keys for both pubs
                  latest_keys = set(r[0] for r in conn.execute("""
                      SELECT pr.product_key FROM product_offerings o
                      JOIN products pr ON pr.id = o.product_id
                      WHERE o.publication_id=?
                  """, (latest['id'],)).fetchall())
                  prev_keys = set(r[0] for r in conn.execute("""
                      SELECT pr.product_key FROM product_offerings o
                      JOIN products pr ON pr.id = o.product_id
                      WHERE o.publication_id=?
                  """, (prev['id'],)).fetchall())

                  added = latest_keys - prev_keys
                  removed = prev_keys - latest_keys
                  common = latest_keys & prev_keys

                  # Price changes among common products
                  price_changes = 0
                  for key in common:
                      l = conn.execute("""
                          SELECT MIN(o.price_numeric) FROM product_offerings o
                          JOIN products pr ON pr.id = o.product_id
                          WHERE o.publication_id=? AND pr.product_key=?
                      """, (latest['id'], key)).fetchone()[0]
                      p = conn.execute("""
                          SELECT MIN(o.price_numeric) FROM product_offerings o
                          JOIN products pr ON pr.id = o.product_id
                          WHERE o.publication_id=? AND pr.product_key=?
                      """, (prev['id'], key)).fetchone()[0]
                      if l is not None and p is not None and abs(l - p) > 0.001:
                          price_changes += 1

                  prev_label = prev['valid_dates'] or prev['original_title'] or prev['slug']
                  latest_label = latest['valid_dates'] or latest['original_title'] or latest['slug']
                  print(f"🔄 CHANGES: {prev_label}  →  {latest_label}")
                  print("─" * 50)
                  print(f"  Added:         {len(added)}")
                  print(f"  Removed:       {len(removed)}")
                  print(f"  Price changes: {price_changes}")
                  print()

                  # List a few added products by name
                  if added:
                      added_names = conn.execute("""
                          SELECT DISTINCT pr.canonical_title
                          FROM product_offerings o
                          JOIN products pr ON pr.id = o.product_id
                          WHERE o.publication_id=? AND pr.product_key IN (%s)
                          LIMIT 5
                      """ % ",".join("?" * len(added)), (latest['id'],) + tuple(added)).fetchall()
                      if added_names:
                          print("  New products this week:")
                          for n in added_names:
                              print(f"    + {n[0]}")
                          print()

          conn.close()
          PYEOF
          echo "Summary written to summary.txt:"
          cat summary.txt

      - name: Send email notification
        if: always()   # runs even if the fetch step failed
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          JOB_STATUS: ${{ job.status }}
          FETCH_RESULT: ${{ steps.fetch.outputs.result }}
          START_TIME: ${{ steps.timer.outputs.start }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          # Compute duration
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          # Skip email entirely when the current week has NOT expired yet.
          # This is the "no spam" path: the cron runs daily, but you only
          # get an email when there's actually something to report.
          if [ "$FETCH_RESULT" = "not-due" ] && [ "$JOB_STATUS" = "success" ]; then
            echo "📧 Email skipped — current week is still valid (not-due). No spam."
            exit 0
          fi

          # Determine status emoji + label
          case "$JOB_STATUS" in
            success) EMOJI="✅"; LABEL="succeeded" ;;
            failure) EMOJI="❌"; LABEL="FAILED" ;;
            cancelled) EMOJI="⚪"; LABEL="cancelled" ;;
            *) EMOJI="❓"; LABEL="$JOB_STATUS" ;;
          esac

          # Determine fetch result label
          case "$FETCH_RESULT" in
            fetched)          RESULT_LABEL="📥 Fetched new week" ;;
            skipped-existing) RESULT_LABEL="⏭️  Skipped (week already in DB)" ;;
            not-due)          RESULT_LABEL="⏰ Not due yet (current week still valid)" ;;
            error)            RESULT_LABEL="⚠️ Error during fetch" ;;
            "")               RESULT_LABEL="(no result — fetch step may have failed)" ;;
            *)                RESULT_LABEL="$FETCH_RESULT" ;;
          esac

          SUBJECT="ALDI fetch $LABEL: $RESULT_LABEL (${DURATION}s)"

          # Read the summary file (generated by the previous step)
          SUMMARY=""
          if [ -f summary.txt ]; then
            SUMMARY=$(cat summary.txt)
          fi

          # Build the email body (heredoc content must be indented to stay
          # inside the YAML block scalar; use <<- to strip leading tabs)
          BODY=$(cat <<EOF
          ALDI daily fetch — $LABEL

          $EMOJI Status:       $JOB_STATUS
          📥 Fetch result:  $RESULT_LABEL
          ⏱️  Duration:      ${DURATION}s
          📦 Repository:    $REPO
          🔗 Run URL:       $RUN_URL

          ─────────────────────────────────────────────────

          $SUMMARY

          ─────────────────────────────────────────────────
          Triggered by: ${{ github.event_name }}
          EOF
          )
          # Strip leading whitespace from each line (caused by YAML indentation)
          BODY=$(echo "$BODY" | sed 's/^          //')

          # Skip if secrets not configured
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "📧 Email skipped — RESEND_API_KEY or NOTIFY_EMAIL secret not set."
            echo "   To enable: add both secrets in repo Settings → Secrets and variables → Actions"
            exit 0
          fi

          echo "📧 Sending email to $NOTIFY_EMAIL..."
          echo "   Subject: $SUBJECT"

          # Send via Resend API (free, 100/day)
          # Resend's free plan sends from onboarding@resend.dev to your verified email.
          JSON_BODY=$(jq -n \
            --arg from "onboarding@resend.dev" \
            --arg to "$NOTIFY_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg body "$BODY" \
            '{from: $from, to: [$to], subject: $subject, text: $body}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d "$JSON_BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESP_BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" = "200" ]; then
            echo "   ✅ Email sent successfully."
          else
            echo "   ❌ Email failed (HTTP $HTTP_CODE): $RESP_BODY"
          fi

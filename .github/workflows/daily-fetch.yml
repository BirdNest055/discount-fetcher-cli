name: Daily ALDI fetch

# The cron fires once a day at a fixed time (12:00 UTC). The job itself
# runs for ~30 seconds — no sleep, no wasted Actions minutes. Randomness
# in fetch timing comes from the cron schedule itself, not from sleeping
# inside the job. To shift the fetch window, just change the cron expression.
#
# Examples:
#   '0 12 * * *'  → 12:00 UTC daily
#   '30 13 * * *' → 13:30 UTC daily
#   '0 6,18 * * *' → twice daily (06:00 and 18:00 UTC)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:  # allows manual trigger from the Actions tab

permissions:
  contents: write  # needed to commit the updated aldi.db back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5   # the actual fetch takes ~30s; 5min is a safe ceiling

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependency
        run: pip install -r requirements.txt

      - name: Run auto-fetch (no jitter — the cron schedule handles timing)
        run: |
          python aldi-cli.py \
            --db aldi.db \
            auto-fetch \
            --log-file aldi.log

      - name: Commit updated DB + log
        run: |
          git config user.name  "aldi-bot"
          git config user.email "aldi-bot@users.noreply.github.com"
          [ -f aldi.db ]  && git add aldi.db
          [ -f aldi.log ] && git add aldi.log
          if git diff --cached --quiet; then
            echo "No changes — week already in DB."
          else
            git commit -m "auto: fetched new week $(date -u +%Y-%m-%d)"
            git push
          fi
